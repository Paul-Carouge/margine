name: margine
description: "Suivi d'achat et revente Vinted — Track your margins."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.2

  # Database
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.6.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Navigation
  go_router: ^17.3.0

  # Charts
  fl_chart: ^1.2.0

  # Utilities
  intl: ^0.20.2
  share_plus: ^13.1.0
  json_annotation: ^4.12.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
